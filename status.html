<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Check Status • Nagara Seva</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#061025;color:#fff} .card{background:rgba(255,255,255,0.06);backdrop-filter:blur(10px);border-radius:12px;padding:18px;} .small{font-size:13px;color:#ccc}</style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-2xl mx-auto card">
    <h2 class="text-2xl font-bold mb-4">Check Complaint Status</h2>
    <div class="flex gap-2 mb-4">
      <input id="refInput" placeholder="Enter 12-digit complaint ID" maxlength="12" class="p-2 rounded text-black w-full" />
      <button id="btnCheck" class="control-btn">Check</button>
    </div>
    <div id="result"></div>
  </div>

  <script>
    function openMediaDB(){
      return new Promise((res,rej)=>{
        const req = indexedDB.open('mediaDB',1);
        req.onupgradeneeded = () => { req.result.createObjectStore('media',{keyPath:'id'}); };
        req.onsuccess = ()=> res(req.result);
        req.onerror = ()=> rej(req.error || new Error('IDB open error'));
      });
    }
    function getBlobUrlFromDB(id){
      return openMediaDB().then(db=>new Promise((res,rej)=>{
        const r = db.transaction('media','readonly').objectStore('media').get(id);
        r.onsuccess = ()=>{ const rec=r.result; db.close(); if(!rec) return res(null); res(URL.createObjectURL(rec.blob)); };
        r.onerror = ()=>{ db.close(); rej(r.error); };
      }));
    }

    document.getElementById('btnCheck').addEventListener('click', async ()=>{
      const ref = document.getElementById('refInput').value.trim();
      const out = document.getElementById('result'); out.innerHTML = 'Searching...';
      const items = JSON.parse(localStorage.getItem('complaints')||'[]');
      const found = items.find(i=>String(i.refId)===String(ref));
      if(!found){ out.innerHTML = '<div class="small">No complaint found with that ID.</div>'; return; }
      out.innerHTML = `<div class="font-semibold">Ref: ${escapeHtml(found.refId)}</div>
        <div class="small">Status: <strong>${escapeHtml(found.status||'Submitted')}</strong></div>
        <div class="mt-2">Issue: ${escapeHtml(found.issue||'')}</div>
        <div class="mt-2 small">Description: ${escapeHtml(found.description||'')}</div>
        <div class="mt-3 mediaArea"></div>`;
      const holder = out.querySelector('.mediaArea');
      if(found.mediaVideoId){ const v = await getBlobUrlFromDB(found.mediaVideoId); if(v){ const vid = document.createElement('video'); vid.controls=true; vid.src=v; vid.style.maxWidth='100%'; holder.appendChild(vid); } }
      if(found.mediaAudioId){ const a = await getBlobUrlFromDB(found.mediaAudioId); if(a){ const au = document.createElement('audio'); au.controls=true; au.src=a; holder.appendChild(au); } }
      if(found.image) { const im = document.createElement('img'); im.src = found.image; im.style.maxWidth='100%'; im.className='mt-2 rounded'; holder.appendChild(im); }
    });
    function escapeHtml(s){ if(!s) return ''; return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }
  </script>
</body>
</html>
